<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>STARLIGHT TICKETS – 로딩 중</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 500px;
            height: 320px;
            overflow: hidden;
            background: transparent;
            font-family: 'Inter', 'Malgun Gothic', sans-serif;
            -webkit-app-region: drag;
        }

        .splash-shell {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(145deg, #EFF6FF 0%, #DBEAFE 40%, #BAE6FD 100%);
            border: 1.5px solid rgba(56, 189, 248, 0.35);
            box-shadow:
                0 32px 80px rgba(14, 165, 233, 0.28),
                0 8px 24px rgba(0,0,0,0.12),
                inset 0 1px 0 rgba(255,255,255,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            position: relative;
            overflow: hidden;
        }

        /* Decorative orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.45;
            pointer-events: none;
        }
        .orb-1 {
            width: 200px; height: 200px;
            background: radial-gradient(circle, #38BDF8, transparent);
            top: -60px; left: -60px;
        }
        .orb-2 {
            width: 180px; height: 180px;
            background: radial-gradient(circle, #818CF8, transparent);
            bottom: -50px; right: -40px;
        }

        /* Logo icon */
        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #0EA5E9 0%, #38BDF8 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 14px;
            box-shadow: 0 8px 24px rgba(14, 165, 233, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-5px); }
        }

        .logo-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.55rem;
            font-weight: 800;
            color: #0F172A;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .logo-name span {
            background: linear-gradient(135deg, #0EA5E9, #6366F1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-sub {
            font-size: 0.8rem;
            color: #64748B;
            font-weight: 500;
            letter-spacing: 0.02em;
            margin-bottom: 28px;
        }

        /* Progress bar */
        .progress-track {
            width: 220px;
            height: 4px;
            background: rgba(14, 165, 233, 0.15);
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0EA5E9, #38BDF8, #0EA5E9);
            background-size: 200% 100%;
            border-radius: 99px;
            animation: progressAnim 2.4s ease-in-out infinite, shimmer 1.5s linear infinite;
        }

        @keyframes progressAnim {
            0%   { width: 0%; }
            50%  { width: 80%; }
            100% { width: 100%; }
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: #0EA5E9;
            border-radius: 50%;
            animation: pulse-dot 1.2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1;   transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.7); }
        }

        .status-text {
            font-size: 0.78rem;
            color: #475569;
            font-weight: 600;
        }

        /* Version tag */
        .version-tag {
            position: absolute;
            bottom: 16px;
            right: 20px;
            font-size: 0.68rem;
            color: #94A3B8;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="splash-shell">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <div class="logo-icon">☁</div>
        <div class="logo-name">STARLIGHT <span>TICKETS</span></div>
        <div class="logo-sub">B2B SaaS 동시성 결제 시뮬레이션 플랫폼</div>

        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>

        <div class="status-row">
            <div class="status-dot"></div>
            <div class="status-text">서비스 엔진 및 데이터베이스 초기화 중...</div>
        </div>

        <div class="version-tag">v1.0.0</div>
    </div>
</body>
</html>
