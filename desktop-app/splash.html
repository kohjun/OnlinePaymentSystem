<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>에브리세일 | 초기화 중</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 520px;
            height: 330px;
            overflow: hidden;
            background: transparent;
            font-family: 'Inter', 'Malgun Gothic', sans-serif;
            -webkit-app-region: drag;
        }

        .shell {
            width: 100%;
            height: 100%;
            border-radius: 18px;
            background: linear-gradient(145deg, #07111f 0%, #0b1728 58%, #102238 100%);
            border: 1px solid rgba(125, 211, 252, 0.18);
            box-shadow: 0 26px 70px rgba(0, 0, 0, 0.62), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            padding: 34px 38px 26px;
        }

        .shell::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(125, 211, 252, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(125, 211, 252, 0.045) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
        }

        .top {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-mark {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            font-size: 1.45rem;
            font-weight: 800;
            box-shadow: 0 12px 30px rgba(14, 165, 233, 0.34);
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.58rem;
            font-weight: 800;
            color: #f8fafc;
            line-height: 1;
            letter-spacing: 0;
        }

        .brand-subtitle {
            margin-top: 7px;
            color: #93a4b8;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .center {
            position: relative;
            z-index: 1;
        }

        .headline {
            color: #e2e8f0;
            font-size: 0.92rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .supporting {
            color: #94a3b8;
            font-size: 0.76rem;
            line-height: 1.55;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            margin-top: 18px;
            background: rgba(148, 163, 184, 0.18);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #38bdf8, #60a5fa, #38bdf8);
            background-size: 200% 100%;
            border-radius: 999px;
            transform-origin: left;
            animation: shimmer 1.5s linear infinite, progress 2.6s ease-in-out infinite;
        }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes progress { 0% { transform: scaleX(0.08); } 65% { transform: scaleX(0.78); } 100% { transform: scaleX(1); } }

        .footer {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #64748b;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #93c5fd;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: #38bdf8;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
            animation: blink 1.2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.38; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="top">
            <div class="logo-mark">E</div>
            <div>
                <div class="brand-name">에브리세일</div>
                <div class="brand-subtitle">EverySale Commerce Operations</div>
            </div>
        </div>

        <div class="center">
            <div class="headline">대규모 판매·예약·결제 운영 시뮬레이션</div>
            <div class="supporting">에브리세일 서비스 엔진과 로컬 데이터 저장소를 초기화 중입니다...</div>
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
        </div>

        <div class="footer">
            <span>에브리세일 v1.0.0</span>
            <span class="status"><span class="status-dot"></span>운영 콘솔 준비 중</span>
        </div>
    </div>
</body>
</html>
