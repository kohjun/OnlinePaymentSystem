name: EverySale Distribution Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  distribution-quality:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop-app
        run: npm ci

      - name: Run distribution quality gate
        shell: pwsh
        run: .\scripts\verify-distribution.ps1
