spring:
  application:
    name: payment-service-test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
    scheduling:
      pool:
        size: 2

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  kafka:
    bootstrap-servers: localhost:9092
    admin:
      auto-create: false
    consumer:
      group-id: payment-events-group
      auto-offset-reset: earliest
      enable-auto-commit: false

server:
  port: 8080

logging:
  level:
    root: INFO
    com.example.payment: DEBUG
    org.springframework.kafka: WARN

payment:
  processing:
    retry-count: 3
    timeout-seconds: 60
  default-gateway: MOCK_PAYMENT_GATEWAY
  topics:
    payment-requests: payment-requests
    payment-events: payment-events

app:
  temporal:
    enabled: false
    worker-enabled: false
    target: localhost:7233
    namespace: payment
    task-queue: payment-reservation-task-queue
    start-to-close-timeout-seconds: 30
    result-wait-timeout-seconds: 5
  outbox:
    enabled: false
  kafka:
    listeners:
      payment-events:
        enabled: false
  legacy-wal:
    enabled: false
