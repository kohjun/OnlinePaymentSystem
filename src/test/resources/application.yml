spring:
  application:
    name: payment-service-test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
    scheduling:
      pool:
        size: 2

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  kafka:
    bootstrap-servers: localhost:9092
    admin:
      auto-create: false
    consumer:
      group-id: payment-events-group
      auto-offset-reset: earliest
      enable-auto-commit: false

server:
  port: 8080

logging:
  level:
    root: INFO
    com.example.payment: DEBUG
    org.springframework.kafka: WARN
  pattern:
    level: "%5p [tenant:%X{tenantId:-everysale-test}] [partner:%X{partnerId:-test-partner}] [corr:%X{correlationId:-n/a}]"

payment:
  processing:
    retry-count: 3
    timeout-seconds: 60
  legacy-api:
    enabled: true
  default-gateway: MOCK_PAYMENT_GATEWAY
  allow-gateway-fallback: true
  mock:
    enabled: true
  toss:
    client-key: test_ck_placeholder
    secret-key: test_sk_placeholder
    base-url: https://api.tosspayments.com
    mode: test
    api-version: 2022-11-16
    test-code:
  topics:
    payment-requests: payment-requests
    payment-events: payment-events

app:
  audit:
    enabled: true
  checkout:
    public-complete-enabled: true
    legacy-marketplace-enabled: true
  distribution:
    brand-name: 에브리세일
    mode: DEMO
    release-channel: test
    minimum-java-version: 17
    fail-fast-on-blockers: false
    require-real-payment-gateway: false
    require-external-auth: false
    require-tenant-isolation: false
  tenancy:
    default-tenant-id: everysale-test
    default-partner-id: test-partner
    require-tenant-header: false
    response-headers-enabled: true
  security:
    mock-auth:
      enabled: true
      default-customer-id: CUST-1049
      default-roles: CUSTOMER,ADMIN
    external-auth:
      enabled: false
  simulation:
    auth:
      enabled: true
      username: test-admin
      password: test-password
  temporal:
    enabled: false
    worker-enabled: false
    target: localhost:7233
    namespace: payment
    task-queue: payment-reservation-task-queue
    start-to-close-timeout-seconds: 30
    result-wait-timeout-seconds: 5
  outbox:
    enabled: false
  kafka:
    listeners:
      payment-events:
        enabled: false
  legacy-wal:
    enabled: false
