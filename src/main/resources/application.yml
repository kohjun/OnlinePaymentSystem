spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5434/payment
    username: payment
    password: payment
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 5

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 500
    scheduling:
      pool:
        size: 4

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000
      # Production HA option: configure Redis Sentinel nodes when deploying outside local Docker.
      # sentinel:
      #   master: mymaster
      #   nodes: 10.0.1.10:26379,10.0.1.11:26379,10.0.1.12:26379
      # Production persistence option: enable AOF to reduce inventory lock loss after node failure.
      # appendonly yes
      # appendfsync everysec
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10
          max-wait: 50ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: payment-events-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.payment.event,com.example.payment.dto,com.example.payment.domain.event,com.example.payment.presentation.dto.response
      enable-auto-commit: false

server:
  port: 8080
  tomcat:
    threads:
      max: 800
      min-spare: 100
    accept-count: 5000
    max-connections: 20000
    connection-timeout: 20000

logging:
  level:
    root: INFO
    com.example.payment: INFO
    org.springframework.kafka: WARN
  pattern:
    level: "%5p [tenant:%X{tenantId:-everysale-demo}] [partner:%X{partnerId:-demo-partner}] [corr:%X{correlationId:-n/a}]"

payment:
  processing:
    retry-count: 3
    timeout-seconds: 60
  default-gateway: TOSS_PAYMENTS
  allow-gateway-fallback: false
  legacy-api:
    enabled: false
  mock:
    enabled: false
  toss:
    client-key: ${TOSS_CLIENT_KEY:}
    secret-key: ${TOSS_SECRET_KEY:}
    base-url: ${TOSS_BASE_URL:https://api.tosspayments.com}
    mode: ${TOSS_MODE:test}
    api-version: ${TOSS_API_VERSION:2022-11-16}
    test-code: ${TOSS_TEST_CODE:}
    reconciliation:
      enabled: true
      fixed-delay-ms: 60000
      stale-seconds: 300
  topics:
    payment-requests: payment-requests
    payment-events: payment-events

app:
  checkout:
    public-complete-enabled: false
    legacy-marketplace-enabled: false
  distribution:
    brand-name: 에브리세일
    mode: DEMO
    release-channel: local-demo
    minimum-java-version: 17
    fail-fast-on-blockers: false
    require-real-payment-gateway: false
    require-external-auth: false
    require-tenant-isolation: false
  tenancy:
    default-tenant-id: everysale-demo
    default-partner-id: demo-partner
    require-tenant-header: false
    response-headers-enabled: true
  security:
    mock-auth:
      enabled: true
      default-customer-id: CUST-1049
      default-roles: CUSTOMER,ADMIN
    external-auth:
      enabled: false
  temporal:
    enabled: true
    worker-enabled: true
    target: localhost:7233
    namespace: payment
    task-queue: payment-reservation-task-queue
    start-to-close-timeout-seconds: 30
    result-wait-timeout-seconds: 5
  outbox:
    enabled: true
    publish-fixed-delay-ms: 1000
    batch-size: 50
    max-retry: 5
    retry-backoff-seconds: 5
    stale-lock-seconds: 60
  kafka:
    listeners:
      payment-events:
        enabled: false
  legacy-wal:
    enabled: false
  inventory:
    reconciliation:
      enabled: true
      fixed-delay-ms: 60000
  rate-limit:
    capacity: 10
    refill-rate: 2
    client-window-seconds: 60
    client-max-requests: 120
  queue:
    enabled: false
