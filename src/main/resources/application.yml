spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5434/payment
    username: payment
    password: payment
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 5

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 500
    scheduling:
      pool:
        size: 4

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000
      # [PRODUCTION HA CONFIGURATION - Redis Sentinel]
      # For production high availability, configure Sentinel nodes:
      # sentinel:
      #   master: mymaster
      #   nodes: 10.0.1.10:26379,10.0.1.11:26379,10.0.1.12:26379
      #
      # [PRODUCTION PERSISTENCE SETUP - AOF]
      # Ensure AOF is enabled in redis.conf on all nodes to prevent inventory lock loss:
      # appendonly yes
      # appendfsync everysec
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10
          max-wait: 50ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: payment-events-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.payment.event,com.example.payment.dto,com.example.payment.domain.event,com.example.payment.presentation.dto.response
      enable-auto-commit: false

server:
  port: 8080
  tomcat:
    threads:
      max: 800
      min-spare: 100
    accept-count: 5000
    max-connections: 20000
    connection-timeout: 20000

logging:
  level:
    root: INFO
    com.example.payment: INFO
    org.springframework.kafka: WARN

payment:
  processing:
    retry-count: 3
    timeout-seconds: 60
  default-gateway: MOCK_PAYMENT_GATEWAY
  topics:
    payment-requests: payment-requests
    payment-events: payment-events

app:
  temporal:
    enabled: true
    worker-enabled: true
    target: localhost:7233
    namespace: payment
    task-queue: payment-reservation-task-queue
    start-to-close-timeout-seconds: 30
    result-wait-timeout-seconds: 5
  outbox:
    enabled: true
    publish-fixed-delay-ms: 1000
    batch-size: 50
    max-retry: 5
    retry-backoff-seconds: 5
  kafka:
    listeners:
      payment-events:
        enabled: false
  legacy-wal:
    enabled: false
  inventory:
    reconciliation:
      enabled: true
      fixed-delay-ms: 60000
  queue:
    enabled: false
